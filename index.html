<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serenity Daily Views Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base: #020617;
    --bg-surface: #0E1223;
    --bg-elevated: #0F172A;
    --bg-subtle: #1E293B;
    --bg-card: #0E1223;
    --border: #1E293B;
    --border-strong: #334155;
    --accent: #22C55E;
    --accent-dim: rgba(34,197,94,0.12);
    --accent-amber: #F59E0B;
    --accent-blue: #3B82F6;
    --accent-red: #EF4444;
    --text-primary: #F8FAFC;
    --text-secondary: #CBD5E1;
    --text-muted: #94A3B8;
    --text-faint: #475569;
    --font: 'IBM Plex Sans', 'IBM Plex Sans JP', -apple-system, sans-serif;
    --sidebar-w: 260px;
    --radius: 8px;
    --radius-sm: 6px;
    --radius-xs: 4px;
  }

  html { font-family: var(--font); background: var(--bg-base); color: var(--text-primary); height: 100%; }
  body { display: flex; height: 100vh; overflow: hidden; }

  /* ─── SIDEBAR ─── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--bg-elevated);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  .sidebar-inner {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .sidebar-inner::-webkit-scrollbar { width: 4px; }
  .sidebar-inner::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

  /* Logo */
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 4px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: var(--bg-elevated);
    flex-shrink: 0;
  }
  .logo-text { font-size: 16px; font-weight: 700; color: var(--text-primary); line-height: 1; }
  .logo-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; letter-spacing: 0.5px; }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 0 -4px; }

  /* Date Nav */
  .date-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 4px;
  }
  .date-nav-btn {
    width: 28px; height: 28px;
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 14px;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
    user-select: none;
  }
  .date-nav-btn:hover { background: var(--border); color: var(--text-primary); }
  .date-nav-display {
    flex: 1;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }

  /* Section header */
  .section-header {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0 4px;
  }

  /* History list */
  .history-list { display: flex; flex-direction: column; gap: 3px; }
  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.12s;
    border: 1px solid transparent;
  }
  .history-item:hover { background: var(--bg-subtle); }
  .history-item.active {
    background: rgba(34,197,94,0.08);
    border-color: rgba(34,197,94,0.2);
  }
  .history-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .history-dot.green { background: var(--accent); }
  .history-dot.muted { background: var(--text-faint); }
  .history-date { font-size: 12px; color: var(--text-secondary); flex: 1; }
  .history-item.active .history-date { color: var(--text-primary); font-weight: 500; }
  .history-count { font-size: 10px; color: var(--text-muted); background: var(--bg-subtle); padding: 2px 6px; border-radius: 10px; }

  /* Sidebar footer */
  .sidebar-footer {
    padding: 16px;
    border-top: 1px solid var(--border);
  }

  /* Language toggle */
  .lang-toggle {
    display: flex;
    background: var(--bg-subtle);
    border-radius: var(--radius-sm);
    padding: 3px;
    gap: 3px;
  }
  .lang-btn {
    flex: 1;
    padding: 7px 0;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
  }
  .lang-btn.active {
    background: var(--accent);
    color: var(--bg-elevated);
  }

  /* ─── MAIN ─── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* Top bar */
  .topbar {
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--bg-base);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-date {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: var(--bg-subtle);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .topbar-date-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 2px; flex-shrink: 0; }
  .topbar-date-text { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .topbar-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .topbar-badge.lang-cn { background: var(--accent); color: var(--bg-elevated); }
  .topbar-badge.lang-en { background: var(--accent-blue); color: white; }
  .topbar-badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.6; }

  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .count-badge {
    font-size: 12px;
    color: var(--text-muted);
    padding: 4px 10px;
    background: var(--bg-subtle);
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .count-badge strong { color: var(--text-primary); font-weight: 600; }

  /* Content scroll area */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px 40px;
  }
  .content::-webkit-scrollbar { width: 6px; }
  .content::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
  .content::-webkit-scrollbar-track { background: transparent; }

  /* Views stream */
  .views-stream { display: flex; flex-direction: column; gap: 16px; max-width: 900px; }

  /* View item */
  .view-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    transition: border-color 0.15s;
    position: relative;
  }
  .view-item:hover { border-color: var(--border-strong); }

  .view-item-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 12px;
  }
  .view-item-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .view-seq {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 2px 8px;
    border-radius: 3px;
    letter-spacing: 0.5px;
    font-variant-numeric: tabular-nums;
  }
  .view-topic-tag {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--bg-subtle);
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid var(--border);
  }
  .view-time {
    font-size: 12px;
    color: var(--text-faint);
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  .view-body {
    font-size: 14px;
    line-height: 1.85;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .view-body strong { color: var(--text-primary); font-weight: 600; }

  .view-item-footer {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg-subtle);
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid var(--border);
  }
  .tag.green { color: var(--accent); border-color: rgba(34,197,94,0.25); background: rgba(34,197,94,0.06); }
  .tag.amber { color: var(--accent-amber); border-color: rgba(245,158,11,0.25); background: rgba(245,158,11,0.06); }
  .tag.blue { color: var(--accent-blue); border-color: rgba(59,130,246,0.25); background: rgba(59,130,246,0.06); }
  .tag.red { color: var(--accent-red); border-color: rgba(239,68,68,0.25); background: rgba(239,68,68,0.06); }

  /* Accent bar on left */
  .view-item::before {
    content: '';
    position: absolute;
    left: 0; top: 18px; bottom: 18px;
    width: 3px;
    background: transparent;
    border-radius: 0 2px 2px 0;
    transition: background 0.15s;
  }
  .view-item.bullish::before { background: var(--accent); }
  .view-item.bearish::before { background: var(--accent-red); }
  .view-item.neutral::before { background: var(--accent-amber); }
  .view-item.info::before { background: var(--accent-blue); }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 300px;
    gap: 12px;
    color: var(--text-muted);
  }
  .empty-state-icon { font-size: 40px; opacity: 0.3; }
  .empty-state-text { font-size: 14px; }

  /* Loading */
  .loading-bar {
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: shimmer 1.5s infinite;
    margin-bottom: 24px;
    border-radius: 2px;
  }
  @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }

  /* Scrollback to top btn */
  .scroll-top {
    position: fixed;
    right: 24px;
    bottom: 32px;
    width: 36px; height: 36px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 16px;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 100;
  }
  .scroll-top.visible { opacity: 1; }
  .scroll-top:hover { color: var(--text-primary); background: var(--bg-subtle); }
</style>
</head>
<body>

<!-- ═══ SIDEBAR ═══ -->

<main class="main">

</main>

          en: `AVGO's custom silicon business represents the highest-conviction structural opportunity in semiconductors right now. Both major custom ASIC customers (Google, Meta) have publicly committed to significantly scaling chip procurement, providing multi-year revenue visibility.

          en: `CRWD's AI-native advantages in endpoint and cloud security are real and continue to expand. Falcon platform AR (Annual Recurring Revenue) module penetration is rising steadily, with net retention above 120% — exceptional customer stickiness.

      {
        seq: "05", time: "10:20 EST",

// STATE

let currentLang = 'cn';
let currentDate = '2026-06-04';
const dateKeys = Object.keys(DATA).sort((a,b) => b.localeCompare(a));

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = dateKeys.map(dk => {
    const d = DATA[dk];
    const isActive = dk === currentDate;
    const dispDate = dk.replace(/(\d{4})-(\d{2})-(\d{2})/, '$2.$3');
    const dow = new Date(dk).toLocaleDateString('en', {weekday:'short'});
    return `<div class="history-item ${isActive ? 'active' : ''}" onclick="selectDate('${dk}')">
      <div class="history-dot ${isActive ? 'green' : 'muted'}"></div>
      <div class="history-date">${dispDate} ${dow}</div>
      <div class="history-count">${d.views.length}</div>
    </div>`;
  }).join('');
}

function renderTopbar() {
  const d = DATA[currentDate];
  document.getElementById('sidebarDate').textContent = currentDate.replace(/(\d{4})-(\d{2})-(\d{2})/, '$1.$2.$3');
  document.getElementById('topbarDate').textContent = d.dates[currentLang];
  const badge = document.getElementById('langBadge');
  const badgeText = document.getElementById('langBadgeText');
  if (currentLang === 'cn') {
    badge.className = 'topbar-badge lang-cn';
    badgeText.textContent = '中文';
  } else {
    badge.className = 'topbar-badge lang-en';
    badgeText.textContent = 'English';
  }
  document.getElementById('viewCount').textContent = d.views.length;
}

function renderViews() {
  const stream = document.getElementById('viewsStream');
  const d = DATA[currentDate];
  if (!d || !d.views.length) {
    stream.innerHTML = `<div class="empty-state"><div class="empty-state-icon">○</div><div class="empty-state-text">${currentLang === 'cn' ? '暂无观点数据' : 'No views for this date'}</div></div>`;
    return;
  }
  stream.innerHTML = d.views.map(v => {
    const body = v.body[currentLang];
    const topic = v.topic[currentLang];
    const tags = v.tags[currentLang];
    // Format body: bold **text** → <strong>text</strong>
    const formattedBody = body.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    const tagColors = { '超配':'green','买入':'green','Overweight':'green','Buy':'green','NVDA':'blue','AVGO':'blue','MSFT':'blue','GOOGL':'blue','CRM':'blue','NOW':'blue','VRT':'amber','ETN':'amber','数据中心电力':'amber','关注':'','Watch':'','风险':'red','Risk':'red','宏观日历':'','Macro Calendar':'' };
    const tagHtml = tags.map(t => `<span class="tag ${tagColors[t]||''}">${t}</span>`).join('');
    return `<div class="view-item ${v.sentiment}">
      <div class="view-item-header">
        <div class="view-item-meta">
          <span class="view-seq">${v.seq}</span>
          <span class="view-topic-tag">${topic}</span>
        </div>
        <div class="view-time">${v.time}</div>
      </div>
      <div class="view-body">${formattedBody}</div>
      <div class="view-item-footer">${tagHtml}</div>
    </div>`;
  }).join('');
}

function render() {
  renderHistory();
  renderTopbar();
  renderViews();
}

// ═══════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════
function selectDate(dk) {
  currentDate = dk;
  document.getElementById('contentArea').scrollTop = 0;
  render();
}

function changeDate(dir) {
  const idx = dateKeys.indexOf(currentDate);
  const newIdx = idx - dir; // dateKeys sorted desc, so -1 = newer, +1 = older
  if (newIdx >= 0 && newIdx < dateKeys.length) {
    selectDate(dateKeys[newIdx]);
  }
}

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btnCN').className = 'lang-btn' + (lang === 'cn' ? ' active' : '');
  document.getElementById('btnEN').className = 'lang-btn' + (lang === 'en' ? ' active' : '');
  render();
}

function scrollToTop() {
  document.getElementById('contentArea').scrollTop = 0;
}

// Scroll to top button visibility
document.getElementById('contentArea').addEventListener('scroll', function() {
  const btn = document.getElementById('scrollTopBtn');
  btn.classList.toggle('visible', this.scrollTop > 200);
});

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
render();
</script>
